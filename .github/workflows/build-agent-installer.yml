name: Build Agent Installer (Windows)

on:
  push:
    branches: [main]
    paths:
      - 'agent/**'
      - '.github/workflows/build-agent-installer.yml'
  pull_request:
    branches: [main]
    paths:
      - 'agent/**'
      - '.github/workflows/build-agent-installer.yml'
  workflow_dispatch:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build:
    name: Build Nexus Agent NSIS installer
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: agent/package-lock.json

      - name: Install agent dependencies
        working-directory: agent
        run: npm ci

      - name: Syntax check agent entrypoints
        working-directory: agent
        shell: pwsh
        run: |
          node --check main.js
          node --check preload.js
          node --check paths.js
          node --check runtimeConfig.js
          node --check installerDefaults.js
          node --check scripts/bake-installer-defaults.js

      # The actual installerDefaults.json is generated automatically by the
      # `prebuild` npm hook (agent/scripts/bake-installer-defaults.js). It
      # bakes only the default server URL into the .exe; the agent JWT is
      # NOT baked at CI time anymore — the server itself signs and ships
      # the agent JWT alongside the .exe through
      # `/api/agent/installer/bundle`. This keeps JWT_SECRET on the host
      # only and means no NEXUS_JWT_SECRET GitHub secret is required.
      - name: Build NSIS installer
        working-directory: agent
        env:
          # Avoid hitting GitHub release publishing
          GH_TOKEN: ''
          # Optional — when set, the build bakes a default server URL into
          # the .exe so end-users don't have to type it in.
          NEXUS_DEFAULT_SERVER_URL: ${{ secrets.NEXUS_DEFAULT_SERVER_URL }}
        run: npm run build

      - name: List build artifacts
        working-directory: agent/dist-gui
        shell: pwsh
        run: Get-ChildItem -Recurse | Select-Object FullName, Length

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: Nexus-Agent-Setup-windows-x64
          path: |
            agent/dist-gui/Nexus-Agent-Setup-*.exe
            agent/dist-gui/Nexus-Agent-Setup-*.exe.blockmap
          if-no-files-found: error
          retention-days: 30

      - name: Attach installer to GitHub release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            agent/dist-gui/Nexus-Agent-Setup-*.exe
            agent/dist-gui/Nexus-Agent-Setup-*.exe.blockmap
