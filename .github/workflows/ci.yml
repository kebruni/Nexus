name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  client:
    name: Client lint & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json
      - name: Install client dependencies
        working-directory: client
        run: npm ci
      - name: Lint client
        working-directory: client
        run: npm run lint
      - name: Build client
        working-directory: client
        run: npm run build

  server:
    name: Server install & syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json
      - name: Install server dependencies
        working-directory: server
        run: npm ci
      - name: Syntax check server entrypoints
        working-directory: server
        run: |
          node --check index.js
          node --check auth.js
          node --check store.js
          node --check config.js
