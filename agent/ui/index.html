<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexus Agent</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background-color: #0B0C10; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    .glass-panel { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 1rem; backdrop-filter: blur(10px); }
    .status-online { color: #10b981; }
    .status-offline { color: #ef4444; }
    #chat-messages { scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.1) transparent; }
    #chat-messages::-webkit-scrollbar { width: 4px; }
    #chat-messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
    .msg-admin { background: rgba(99, 102, 241, 0.15); border: 1px solid rgba(99, 102, 241, 0.3); border-radius: 1rem 1rem 0.25rem 1rem; }
    .msg-agent { background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 1rem 1rem 1rem 0.25rem; }
    .fade-in { animation: fadeIn 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
  </style>
</head>
<body class="flex flex-col h-screen p-4 gap-4 overflow-hidden selection:bg-indigo-500/30">

  <!-- Header -->
  <header class="glass-panel flex items-center justify-between px-5 py-4 shrink-0 shadow-lg relative overflow-hidden">
    <!-- Abstract glow -->
    <div class="absolute -top-10 -right-10 w-24 h-24 bg-indigo-500/20 rounded-full blur-2xl pointer-events-none"></div>

    <div class="flex flex-col z-10">
      <h1 class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-indigo-400 to-cyan-400 flex items-center gap-2.5">
        <svg class="w-6 h-6 text-indigo-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a10 10 0 1 0 10 10H12V2z"/><path d="M12 12 2.1 7.1"/><path d="M12 12l9.9 4.9"/></svg>
        Nexus Core
      </h1>
      <p id="agent-id" class="text-[10px] text-white/40 font-mono mt-1 font-medium tracking-wide"></p>
    </div>
    
    <div class="flex items-center gap-2.5 bg-black/40 px-3 py-1.5 rounded-full border border-white/5 z-10">
      <span class="relative flex h-2.5 w-2.5">
        <span id="status-ping" class="animate-ping absolute inline-flex h-full w-full rounded-full opacity-75 bg-red-400"></span>
        <span id="status-dot" class="relative inline-flex rounded-full h-2.5 w-2.5 bg-red-500"></span>
      </span>
      <span id="status-text" class="status-offline font-bold uppercase text-[10px] tracking-wider">Offline</span>
    </div>
  </header>

  <!-- Chat Area (Main Focus) -->
  <div class="glass-panel flex flex-col flex-1 min-h-0 !p-0 overflow-hidden shadow-xl">
    <div class="flex items-center justify-between px-5 py-3 border-b border-white/5 bg-white/[0.02]">
      <div class="flex items-center gap-2">
        <div class="w-6 h-6 rounded-lg bg-indigo-500/20 flex items-center justify-center text-indigo-400">
          <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        </div>
        <span class="text-xs font-semibold text-white/90">Console Chat</span>
      </div>
      <span id="msg-count" class="text-[10px] font-medium text-white/30 bg-white/5 px-2 py-0.5 rounded-full">0 msgs</span>
    </div>

    <div id="chat-messages" class="flex-1 overflow-y-auto px-5 py-4 space-y-3">
      <div id="chat-empty" class="flex flex-col items-center justify-center h-full text-center opacity-50">
        <div class="w-12 h-12 rounded-2xl border border-white/10 flex items-center justify-center mb-4">
          <svg class="w-6 h-6 text-white/40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
        </div>
        <p class="text-sm font-medium text-white">Listening for connection...</p>
        <p class="text-[11px] text-white/60 mt-1.5 max-w-[200px]">Administrative commands and messages will appear here when connected.</p>
      </div>
    </div>

    <div class="px-4 py-3 border-t border-white/5 bg-black/20">
      <form id="chat-form" class="flex items-center gap-2">
        <input
          id="chat-input"
          type="text"
          placeholder="Send trace message..."
          autocomplete="off"
          class="flex-1 bg-white/5 border border-white/10 text-white text-sm rounded-xl px-4 py-2.5 outline-none focus:border-indigo-500/50 transition placeholder-white/30"
        />
        <button type="submit" class="p-2.5 bg-indigo-500 hover:bg-indigo-400 text-white rounded-xl transition disabled:opacity-30 disabled:scale-95 shadow-[0_0_15px_rgba(99,102,241,0.3)] disabled:shadow-none" id="send-btn" disabled>
          <svg class="w-4 h-4 ml-0.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </form>
    </div>
  </div>

  <!-- Footer -->
  <div class="flex items-center justify-between text-[9px] uppercase font-bold tracking-widest text-white/30 shrink-0 px-1">
    <span>Uplink: <span id="server-url" class="text-white/50 lowercase">disconnected</span> <button id="edit-server" class="ml-1 text-indigo-400/70 hover:text-indigo-300">[edit]</button></span>
    <span id="hostname" class="text-indigo-400/70"></span>
  </div>

  <script>
    const statusPing = document.getElementById('status-ping');
    const statusDot = document.getElementById('status-dot');
    const statusText = document.getElementById('status-text');
    const chatMessages = document.getElementById('chat-messages');
    const chatEmpty = document.getElementById('chat-empty');
    const chatForm = document.getElementById('chat-form');
    const chatInput = document.getElementById('chat-input');
    const sendBtn = document.getElementById('send-btn');
    const serverUrl = document.getElementById('server-url');
    const msgCount = document.getElementById('msg-count');

    let messageCounter = 0;

    // Init
    window.electronAPI.getAgentInfo().then(info => {
      document.getElementById('agent-id').innerText = info.agentId.split('-').slice(0,3).join('-');
      document.getElementById('hostname').innerText = info.hostname;
    });

    // Status Updates
    window.electronAPI.onStatusUpdate((data) => {
      if (data.online) {
        statusPing.className = 'animate-ping absolute inline-flex h-full w-full rounded-full opacity-75 bg-emerald-400';
        statusPing.style.display = 'block';
        statusDot.className = 'relative inline-flex rounded-full h-2.5 w-2.5 bg-emerald-500 shadow-[0_0_8px_#10b981]';
        statusText.innerText = 'Connected';
        statusText.className = 'status-online font-bold uppercase text-[10px] tracking-wider';
        serverUrl.innerText = data.server.replace(/^https?:\/\//, '');
      } else {
        statusPing.className = '';
        statusPing.style.display = 'none';
        statusDot.className = 'relative inline-flex rounded-full h-2.5 w-2.5 bg-red-500/80';
        statusText.innerText = 'Offline';
        statusText.className = 'status-offline font-bold uppercase text-[10px] tracking-wider';
        serverUrl.innerText = 'disconnected';
      }
    });

    // Ignore incoming metrics
    window.electronAPI.onMetricsUpdate((metrics) => { /* UI ignores metrics */ });

    // Chat
    window.electronAPI.onChatMessage((data) => {
      addMessage(data.sender || 'Admin', data.text, 'admin');
    });

    chatInput.addEventListener('input', () => {
      sendBtn.disabled = !chatInput.value.trim();
    });

    document.getElementById('edit-server').addEventListener('click', async () => {
      const current = serverUrl.innerText && serverUrl.innerText !== 'disconnected'
        ? `http://${serverUrl.innerText}`
        : 'http://localhost:3000';
      const next = window.prompt('Server URL (http(s)://host:port):', current);
      if (!next) return;
      const res = await window.electronAPI.updateServerUrl(next.trim());
      if (!res.success) {
        window.alert('Failed to update server URL: ' + (res.error || 'unknown'));
      }
    });

    chatForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const text = chatInput.value.trim();
      if (!text) return;
      window.electronAPI.sendChatMessage(text);
      addMessage('Agent', text, 'agent');
      chatInput.value = '';
      sendBtn.disabled = true;
    });

    function addMessage(sender, text, type) {
      messageCounter++;
      if (chatEmpty) chatEmpty.remove();
      
      const div = document.createElement('div');
      div.textContent = text;
      const safeText = div.innerHTML;
      
      const sDiv = document.createElement('div');
      sDiv.textContent = sender;
      const safeSender = sDiv.innerHTML;

      const msgEl = document.createElement('div');
      msgEl.className = 'flex ' + (type === 'agent' ? 'justify-end' : 'justify-start') + ' fade-in';
      msgEl.innerHTML = 
        '<div class="max-w-[85%] px-3.5 py-2.5 shadow-sm ' + (type === 'agent' ? 'msg-agent' : 'msg-admin') + '">' +
          '<div class="text-[9px] font-bold tracking-wider uppercase ' + (type === 'agent' ? 'text-white/40' : 'text-indigo-400/80') + ' mb-1">' + safeSender + '</div>' +
          '<p class="text-[13px] leading-relaxed text-white/95 break-words whitespace-pre-wrap">' + safeText + '</p>' +
          '<div class="text-[8px] text-white/30 mt-1.5 ' + (type === 'agent' ? 'text-right' : 'text-left') + '">' + new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) + '</div>' +
        '</div>';
      chatMessages.appendChild(msgEl);
      msgCount.innerText = messageCounter + ' msgs';
      
      // Auto-scroll logic smoothly
      chatMessages.scrollTo({
        top: chatMessages.scrollHeight,
        behavior: 'smooth'
      });
    }
  </script>
</body>
</html>
